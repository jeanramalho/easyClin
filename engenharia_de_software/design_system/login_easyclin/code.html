<!-- Login Card -->
<div class="glass-card rounded-xl p-8 shadow-lg">
<h2 class="font-title-md text-title-md text-on-surface mb-6">Acesse sua conta</h2>
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest dark:bg-inverse-surface border border-outline-variant dark:border-outline rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all outline-none" id="email" name="email" placeholder="exemplo@clinica.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="password">Senha</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Esqueci minha senha</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest dark:bg-inverse-surface border border-outline-variant dark:border-outline rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full py-3.5 bg-primary text-on-primary font-title-md text-title-md rounded-lg hover:bg-primary-container active:scale-95 transition-all shadow-md flex items-center justify-center group" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>

<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Mock interaction for form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add your redirect or login logic here
            }, 1500);
        });
    </script>
